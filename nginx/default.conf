server {
    listen 80;
    server_name _;                    # Acepta cualquier dominio o IP

    root /var/www/html/public;        # Apunta al public/ de Laravel
    index index.php index.html;

    # Logs
    access_log /var/log/nginx/pqrs_access.log;
    error_log  /var/log/nginx/pqrs_error.log;

    # Tamaño máximo de subida
    client_max_body_size 20M;

    # Rutas de Laravel
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Procesamiento de PHP
    location ~ \.php$ {
        fastcgi_pass   app:9000;      # 'app' es el nombre del contenedor Laravel
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_read_timeout 300;
    }

    # Negar acceso a archivos ocultos
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Cache de assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}

# Proxy para n8n en puerto 8080
server {
    listen 8080;
    server_name _;

    location / {
        proxy_pass         http://n8n:5678;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300;
    }
}